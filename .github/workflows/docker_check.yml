name: Deploy to Kind Cluster

on:
  workflow_call:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=annaclaratxm_devops
            -Dsonar.organization=annaclaratxm
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=.
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Falha se houver mais de 2 vulnerabilidades 
        run: |
          sh ./scripts/sonar_check.sh
